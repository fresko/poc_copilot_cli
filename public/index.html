<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valet Parking Manager</title>
    <link href="vendor/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="vendor/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #e74c3c;
            --accent-color: #3498db;
        }
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background-color: var(--primary-color) !important;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .status-badge {
            font-size: 0.85em;
            padding: 5px 10px;
            border-radius: 20px;
        }
        @keyframes activePulse {
            0%   { box-shadow: 0 0 0 0 rgba(2, 136, 209, 0.45); }
            70%  { box-shadow: 0 0 0 7px rgba(2, 136, 209, 0); }
            100% { box-shadow: 0 0 0 0 rgba(2, 136, 209, 0); }
        }
        .status-active {
            background-color: #e1f5fe;
            color: #0288d1;
            animation: activePulse 1.8s ease-out infinite;
        }
        @media (prefers-reduced-motion: reduce) {
            .status-active { animation: none; }
        }
        .status-completed { background-color: #e8f5e9; color: #2e7d32; }
        .status-cancelled { background-color: #ffebee; color: #c62828; }
        
        .btn-action {
            width: 32px;
            height: 32px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-left: 5px;
        }
        .fab-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
            border: none;
        }
        .fab-add:hover {
            transform: scale(1.1);
            background-color: #2980b9;
        }
        .stat-card {
            border-left: 4px solid;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-parking me-2"></i> Valet Manager</a>
        </div>
    </nav>

    <div class="container">
        
        <!-- Stats Row -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card stat-card" style="border-left-color: #3498db;">
                    <div class="card-body">
                        <h6 class="text-muted text-uppercase">Active Vehicles</h6>
                        <h2 id="stat-active">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card" style="border-left-color: #2ecc71;">
                    <div class="card-body">
                        <h6 class="text-muted text-uppercase">Completed Today</h6>
                        <h2 id="stat-completed">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card" style="border-left-color: #95a5a6;">
                    <div class="card-body">
                        <h6 class="text-muted text-uppercase">Total Customers</h6>
                        <h2 id="stat-customers">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter/Search -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Reservations</h4>
            <div class="w-25">
                <input type="text" id="searchInput" class="form-control" placeholder="Search license plate...">
            </div>
        </div>

        <!-- Reservations List -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Vehicle</th>
                                <th>Customer</th>
                                <th>Check-in</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="reservationTableBody">
                            <!-- Dynamic Content -->
                        </tbody>
                    </table>
                </div>
                <div id="emptyState" class="text-center py-5 d-none">
                    <i class="fas fa-car fa-3x text-muted mb-3"></i>
                    <p class="text-muted">No active reservations found.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Modal -->
    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">New Valet Reservation</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createForm">
                        <div class="row">
                            <!-- Customer Section -->
                            <div class="col-md-6 mb-3">
                                <h6 class="border-bottom pb-2 mb-3 text-primary">Customer Details</h6>
                                <div class="mb-3">
                                    <label class="form-label">Full Name *</label>
                                    <input type="text" name="fullName" class="form-control" required minlength="2">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Mobile Number *</label>
                                    <input type="tel" name="mobileNumber" class="form-control" required>
                                </div>
                            </div>
                            
                            <!-- Vehicle Section -->
                            <div class="col-md-6 mb-3">
                                <h6 class="border-bottom pb-2 mb-3 text-primary">Vehicle Details</h6>
                                <div class="mb-3">
                                    <label class="form-label">License Plate *</label>
                                    <input type="text" name="licensePlate" class="form-control text-uppercase" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Damage Report</label>
                                    <textarea name="damageReport" class="form-control" rows="1" placeholder="Optional scratches, dents..."></textarea>
                                </div>
                            </div>
                        </div>
                        <input type="hidden" name="qrCodeData" id="qrCodeData">
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitReservation()">Check In Vehicle</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Checkout</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <p class="lead">Current Time</p>
                    <div class="d-flex justify-content-center mb-3">
                        <canvas id="clockCanvas" width="200" height="200" style="background-color: #f8f9fa; border-radius: 50%; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);"></canvas>
                    </div>
                    <p id="checkoutTimeDisplay" class="h4 font-monospace text-muted"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" id="confirmCheckoutBtn">Confirm Exit</button>
                </div>
            </div>
        </div>
    </div>

    <button class="fab-add" data-bs-toggle="modal" data-bs-target="#createModal">
        <i class="fas fa-plus"></i>
    </button>

    <script src="vendor/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
